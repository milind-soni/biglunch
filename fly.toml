app = "biglunch-worker"
primary_region = "bom"

[build]
  dockerfile = "pipelines/Dockerfile"
  ignorefile = "pipelines/.dockerignore"

[build.args]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
